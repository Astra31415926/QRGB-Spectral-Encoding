<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGB - Pop Surrealism Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <style>
        :root {
            --neon-r: #ff0044;
            --neon-g: #00ff66;
            --neon-b: #0066ff;
            --canvas-bg: #111;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Контейнер приложения */
        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-b);
        }

        /* ВЕРХНЯЯ ЗОНА: Display & QR */
        .art-frame {
            border: 8px solid #222;
            border-image: linear-gradient(45deg, #333, #111, #444) 1;
            padding: 15px;
            background: #050505;
            box-shadow: 0 0 30px rgba(0,0,0,1), inset 0 0 20px #000;
            position: relative;
        }

        /* Цветные блоки как мазки мастихином */
        .display-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .paint-stroke {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        /* Эффект масляных мазков через градиенты и наложения */
        #block-r { 
            background: linear-gradient(110deg, #8b0000 0%, #ff0044 50%, #ff6688 100%); 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 0 10px rgba(255,0,68,0.3);
        }
        #block-g { 
            background: linear-gradient(110deg, #004411 0%, #00ff66 50%, #aaffcc 100%); 
            color: #000; text-shadow: none; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 0 10px rgba(0,255,102,0.3);
        }
        #block-b { 
            background: linear-gradient(110deg, #001144 0%, #0066ff 50%, #66aaff 100%); 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 0 10px rgba(0,102,255,0.3);
        }

        /* Текстура холста поверх блоков */
        .paint-stroke::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
            opacity: 0.2;
            pointer-events: none;
        }

        /* QR-Код в раме */
        .qr-wrap {
            display: flex;
            justify-content: center;
            padding: 10px;
            background: #fff;
            border-radius: 2px;
            margin: 0 auto;
            width: 160px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        /* СРЕДНЯЯ ЗОНА: Ввод */
        .input-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 5px;
            color: #fff;
            outline: none;
            transition: 0.4s;
            font-size: 1rem;
        }

        input#input-r:focus { border-color: var(--neon-r); box-shadow: 0 0 10px var(--neon-r); }
        input#input-g:focus { border-color: var(--neon-g); box-shadow: 0 0 10px var(--neon-g); }
        input#input-b:focus { border-color: var(--neon-b); box-shadow: 0 0 10px var(--neon-b); }

        /* НИЖНЯЯ ЗОНА: Сканер-Глаз */
        .scanner-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .eye-button-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            cursor: pointer;
        }

        .eye-outer {
            width: 100%;
            height: 100%;
            background: #222;
            border-radius: 50% 0%;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #444;
            overflow: hidden;
            animation: pulse-eye 4s infinite ease-in-out;
        }

        .eye-iris {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #00ff66, #004411);
            border-radius: 50%;
            transform: rotate(-45deg);
            border: 4px solid #000;
            position: relative;
        }

        .eye-iris::after {
            content: "";
            position: absolute;
            top: 5px; left: 5px;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
        }

        #upload {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .upload-label {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes pulse-eye {
            0%, 100% { transform: rotate(45deg) scale(1); box-shadow: 0 0 5px var(--neon-g); }
            50% { transform: rotate(45deg) scale(1.05); box-shadow: 0 0 20px var(--neon-g); }
        }

    </style>
</head>
<body>

    <div class="app-container">
        <h1>QRGB</h1>

        <div class="art-frame">
            <div class="display-stack">
                <div id="block-r" class="paint-stroke"></div>
                <div id="block-g" class="paint-stroke"></div>
                <div id="block-b" class="paint-stroke"></div>
            </div>

            <div class="qr-wrap">
                <div id="qrcode"></div>
            </div>
        </div>

        <div class="input-stack">
            <input type="text" id="input-r" placeholder="Red Channel" oninput="generate()">
            <input type="text" id="input-g" placeholder="Green Channel" oninput="generate()">
            <input type="text" id="input-b" placeholder="Blue Channel" oninput="generate()">
        </div>

        <div class="scanner-zone">
            <div class="eye-button-wrap">
                <input type="file" id="upload" accept="image/*">
                <div class="eye-outer">
                    <div class="eye-iris"></div>
                </div>
            </div>
            <div class="upload-label">Scan Vision</div>
        </div>
    </div>

    <script>
        // Инициализация QR
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 160,
            height: 160,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Логика генерации
        function generate() {
            const r = document.getElementById('input-r').value;
            const g = document.getElementById('input-g').value;
            const b = document.getElementById('input-b').value;

            document.getElementById('block-r').textContent = r;
            document.getElementById('block-g').textContent = g;
            document.getElementById('block-b').textContent = b;

            const combinedText = `R:${r}|G:${g}|B:${b}`;
            qrcode.makeCode(combinedText);
        }

        // Логика сканирования
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code) {
                        parseRGBData(code.data);
                    } else {
                        alert("QR-код не найден на изображении");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function parseRGBData(data) {
            const parts = data.split('|');
            parts.forEach(part => {
                if (part.startsWith('R:')) document.getElementById('input-r').value = part.substring(2);
                if (part.startsWith('G:')) document.getElementById('input-g').value = part.substring(2);
                if (part.startsWith('B:')) document.getElementById('input-b').value = part.substring(2);
            });
            generate(); // Обновляем блоки и QR
        }

        // Первый запуск
        generate();
    </script>
</body>
</html>
