<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>▣ QRGB Ultra - Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <style>
        body { background: #000; color: #e5e5e5; font-family: system-ui, sans-serif; }
        canvas { image-rendering: pixelated; }
        textarea { 
            font-size: 16px; resize: none; min-height: 56px; 
            background: #0a0a0a; border: 1px solid #333; color: white;
        }
        .scan-line { 
            position:absolute; left:0; right:0; height:3px; 
            background:linear-gradient(90deg,transparent,#00ff41,transparent); 
            box-shadow:0 0 20px #00ff41; 
            animation:scanLine 2.5s linear infinite; 
        }
        @keyframes scanLine { 0%{top:0%;} 100%{top:100%;} }
        @keyframes flash { 0%,100%{opacity:0} 50%{opacity:.6} }
        .flash { animation:flash .3s; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="fixed top-0 z-50 w-full bg-black/95 backdrop-blur h-16 flex items-center px-4 border-b border-white/10">
        <canvas id="mini-qr" width="56" height="56" class="w-12 h-12 bg-gray-900 rounded-lg mr-4"></canvas>
        <h1 class="flex-1 font-bold text-lg text-white text-center">▣ QRGB ULTRA</h1>
        <div class="w-12"></div> 
    </header>

    <main class="flex-1 pt-20 pb-28 px-6 flex flex-col max-w-md mx-auto w-full">
        
        <div class="space-y-4 mb-6">
            <div class="relative">
                <div class="absolute left-3 top-4 w-1.5 h-10 bg-[#ff004d] rounded-full"></div>
                <textarea id="r-text" class="w-full p-4 pl-10 rounded-2xl focus:border-[#ff004d] outline-none transition-all" placeholder="Текст для Red..."></textarea>
            </div>
            <div class="relative">
                <div class="absolute left-3 top-4 w-1.5 h-10 bg-[#00ff41] rounded-full"></div>
                <textarea id="g-text" class="w-full p-4 pl-10 rounded-2xl focus:border-[#00ff41] outline-none transition-all" placeholder="Текст для Green..."></textarea>
            </div>
            <div class="relative">
                <div class="absolute left-3 top-4 w-1.5 h-10 bg-[#0088ff] rounded-full"></div>
                <textarea id="b-text" class="w-full p-4 pl-10 rounded-2xl focus:border-[#0088ff] outline-none transition-all" placeholder="Текст для Blue..."></textarea>
            </div>
        </div>

        <div class="flex-1 flex items-center justify-center min-h-[300px]">
            <div class="w-72 h-72 bg-white rounded-3xl shadow-2xl p-4 relative overflow-hidden">
                <div id="qr-empty" class="absolute inset-0 flex items-center justify-center text-gray-400 text-xs text-center p-8 bg-gray-900/50">Введіть текст для генерації RGB-коду</div>
                <canvas id="qr-main" width="256" height="256" class="w-full h-full rounded-lg opacity-0 transition-opacity"></canvas>
            </div>
        </div>

        <div class="mt-6 space-y-3">
            <button id="save-btn" onclick="saveQR()" class="w-full py-4 bg-white text-black font-bold rounded-2xl hidden">📱 Зберегти PNG</button>
            <button onclick="toggleScanner()" class="w-full py-4 bg-zinc-800 text-white font-bold rounded-2xl border border-white/10">🔍 Сканувати / Камера</button>
        </div>
    </main>

    <div id="scanner-ui" class="fixed inset-0 z-[100] bg-black hidden flex flex-col p-6">
        <button onclick="toggleScanner()" class="self-end p-4 text-white">✕ Закрити</button>
        <div class="relative w-full aspect-square bg-zinc-900 rounded-3xl overflow-hidden border-2 border-white/20">
            <video id="video" class="absolute inset-0 w-full h-full object-cover" playsinline></video>
            <div class="scan-line"></div>
            <div id="flash-layer" class="absolute inset-0 bg-white opacity-0 pointer-events-none"></div>
        </div>
        <div id="scan-results" class="mt-8 space-y-2">
            <div id="res-r" class="p-3 bg-red-900/20 border-l-4 border-red-500 rounded-lg text-sm">R: <span>-</span></div>
            <div id="res-g" class="p-3 bg-green-900/20 border-l-4 border-green-500 rounded-lg text-sm">G: <span>-</span></div>
            <div id="res-b" class="p-3 bg-blue-900/20 border-l-4 border-blue-500 rounded-lg text-sm">B: <span>-</span></div>
        </div>
    </div>

    <script>
        const els = {
            r: document.getElementById('r-text'),
            g: document.getElementById('g-text'),
            b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'),
            mini: document.getElementById('mini-qr'),
            video: document.getElementById('video')
        };

        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) {
                document.getElementById('qr-main').style.opacity = 0;
                document.getElementById('qr-empty').style.opacity = 1;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }

            const size = 256;
            const ctx = els.main.getContext('2d');
            ctx.clearRect(0,0,size,size);
            ctx.fillStyle = "#fff";
            ctx.fillRect(0,0,size,size);

            // Режим наложения для RGB
            ctx.globalCompositeOperation = "multiply";

            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(0, 'M');
                qr.addData(text || " ");
                qr.make();
                const count = qr.getModuleCount();
                const modSize = size / count;

                ctx.fillStyle = i === 0 ? "#ff004d" : i === 1 ? "#00ff41" : "#0088ff";

                for (let r = 0; r < count; r++) {
                    for (let c = 0; c < count; c++) {
                        if (qr.isDark(r, c)) {
                            ctx.fillRect(c * modSize, r * modSize, modSize, modSize);
                        }
                    }
                }
            });

            ctx.globalCompositeOperation = "source-over";
            els.main.style.opacity = 1;
            document.getElementById('qr-empty').style.opacity = 0;
            document.getElementById('save-btn').classList.remove('hidden');
            
            // Обновить миниатюру
            const mCtx = els.mini.getContext('2d');
            mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,56,56);
            mCtx.drawImage(els.main, 0, 0, 56, 56);
        }

        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));

        function saveQR() {
            const a = document.createElement('a');
            a.download = 'qrgb_ultra.png';
            a.href = els.main.toDataURL();
            a.click();
        }

        // --- SCANNER LOGIC ---
        let scanning = false;
        async function toggleScanner() {
            const ui = document.getElementById('scanner-ui');
            if (scanning) {
                scanning = false;
                if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
                ui.classList.add('hidden');
            } else {
                ui.classList.remove('hidden');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    els.video.srcObject = stream;
                    els.video.play();
                    scanning = true;
                    requestAnimationFrame(scanFrame);
                } catch (e) { alert("Камера недоступна"); ui.classList.add('hidden'); }
            }
        }

        function scanFrame() {
            if (!scanning) return;
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = els.video.videoWidth;
                canvas.height = els.video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(els.video, 0, 0, canvas.width, canvas.height);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                const channels = [0, 1, 2]; // R, G, B
                channels.forEach(idx => {
                    const monoData = new Uint8ClampedArray(imgData.data.length);
                    for (let i = 0; i < imgData.data.length; i += 4) {
                        const v = imgData.data[i + idx];
                        // Порог яркости для выделения канала
                        const b = v < 120 ? 0 : 255; 
                        monoData[i] = monoData[i+1] = monoData[i+2] = b;
                        monoData[i+3] = 255;
                    }
                    const code = jsQR(monoData, canvas.width, canvas.height);
                    if (code) {
                        const resEl = document.getElementById(['res-r','res-g','res-b'][idx]);
                        resEl.querySelector('span').textContent = code.data;
                        resEl.classList.add('bg-white/20');
                        document.getElementById('flash-layer').classList.add('flash');
                        setTimeout(() => document.getElementById('flash-layer').classList.remove('flash'), 300);
                    }
                });
            }
            requestAnimationFrame(scanFrame);
        }
    </script>
</body>
</html>
