<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGB</title>
    <!-- Библиотека для генерации QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Библиотека для сканирования QR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { margin-bottom: 20px; }
        .input-group { width: 100%; max-width: 400px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        .display-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .block { height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 12px; text-shadow: 1px 1px 2px #000; overflow: hidden; }
        #block-r { background-color: #ff4444; }
        #block-g { background-color: #44ff44; color: #000; text-shadow: none; }
        #block-b { background-color: #4444ff; }
        #qrcode { background: #fff; padding: 10px; border-radius: 8px; }
        
        /* Стили для загрузчика (соответствуют общему стилю) */
        #upload { margin-top: 20px; cursor: pointer; }
        #upload::file-selector-button {
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <h1>QRGB</h1>

    <div class="input-group">
        <input type="text" id="input-r" placeholder="Red text" oninput="generate()">
        <input type="text" id="input-g" placeholder="Green text" oninput="generate()">
        <input type="text" id="input-b" placeholder="Blue text" oninput="generate()">
    </div>

    <div class="display-container">
        <div id="block-r" class="block"></div>
        <div id="block-g" class="block"></div>
        <div id="block-b" class="block"></div>
    </div>

    <div id="qrcode"></div>

    <!-- Поле для загрузки изображения -->
    <input type="file" id="upload" accept="image/*">

    <!-- Скрытый canvas для обработки изображения -->
    <canvas id="canvas-hidden" style="display: none;"></canvas>

    <script>
        // --- Логика генерации (существующая) ---
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 160,
            height: 160,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function generate() {
            const r = document.getElementById('input-r').value;
            const g = document.getElementById('input-g').value;
            const b = document.getElementById('input-b').value;

            // Обновляем текст в блоках
            document.getElementById('block-r').textContent = r;
            document.getElementById('block-g').textContent = g;
            document.getElementById('block-b').textContent = b;

            // Генерируем QR из объединенной строки
            const combinedText = `R:${r}|G:${g}|B:${b}`;
            qrcode.makeCode(combinedText);
        }

        // Начальная генерация
        generate();


        // --- Логика сканирования (новая) ---
        const uploadInput = document.getElementById('upload');
        const hiddenCanvas = document.getElementById('canvas-hidden');
        const ctx = hiddenCanvas.getContext('2d');

        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Рисуем изображение на скрытом canvas
                    hiddenCanvas.width = img.width;
                    hiddenCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    // Получаем данные изображения
                    const imageData = ctx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
                    
                    // Сканируем с помощью jsQR
                    const code = jsQR(imageData.data, imageData.width, imageData.height);
                    
                    if (code) {
                        // Парсим строку формата R:текст|G:текст|B:текст
                        // Используем регулярное выражение для надежного извлечения
                        const match = code.data.match(/^R:(.*?)\|G:(.*?)\|B:(.*)$/);
                        
                        if (match) {
                            // match[1] - R, match[2] - G, match[3] - B
                            document.getElementById('input-r').value = match[1];
                            document.getElementById('input-g').value = match[2];
                            document.getElementById('input-b').value = match[3];
                            
                            // Вызываем функцию генерации, чтобы обновить блоки и сгенерировать новый QR
                            generate();
                        } else {
                            alert("QR-код найден, но формат не совпадает: " + code.data);
                        }
                    } else {
                        alert("QR-код не найден на изображении.");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
