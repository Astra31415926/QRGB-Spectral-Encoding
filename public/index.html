<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRGB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 24px; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { color: #fff; font-size: 28px; font-weight: 600; letter-spacing: 2px; text-align: center; margin-bottom: 32px; }
        .inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        input { background: #111; border: 1px solid #333; color: #fff; font-size: 18px; padding: 14px 16px; border-radius: 8px; outline: none; width: 100%; }
        input::placeholder { color: #666; }
        input:focus { border-color: #555; }
        .colors { display: flex; gap: 12px; }
        .color-block { flex: 1; height: 80px; border-radius: 8px; }
        .color-block.red { background: #ff0000; }
        .color-block.green { background: #00ff00; }
        .color-block.blue { background: #0000ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QRGB</h1>
        <div class="inputs">
            <input type="text" placeholder="R">
            <input type="text" placeholder="G">
            <input type="text" placeholder="B">
        </div>
        <div class="colors">
            <div class="color-block red"></div>
            <div class="color-block green"></div>
            <div class="color-block blue"></div>
        </div>
    </div>
</body>
</html>
